  <!-- plus -->
  <line x1="590" y1="462" x2="590" y2="718" stroke="#3c3c3c" stroke-width="26" stroke-linecap="round"/>
  <line x1="462" y1="590" x2="718" y2="590" stroke="#3c3c3c" stroke-width="26" stroke-linecap="round"/>
